name: Deploy Backend to Vercel

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  VERCEL_ORG_ID: team_X2f8zsWjkKOsLwvLhc2NSHsw
  VERCEL_PROJECT_ID: prj_2BCZVNEXtsq5iMBRWEdJfsLRfS8T

jobs:
  vercel:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: backend
        run: npm ci

      - name: Generate Prisma client (build step)
        working-directory: backend
        run: npm run vercel-build

      - name: Check Vercel deploy token
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          if [ -z "$VERCEL_TOKEN" ]; then
            echo "::warning::Skipping Vercel deploy — add VERCEL_TOKEN under Settings → Secrets and variables → Actions."
            echo "Create a token at https://vercel.com/account/tokens"
            echo "deploy_enabled=false" >> "$GITHUB_ENV"
          else
            echo "deploy_enabled=true" >> "$GITHUB_ENV"
          fi

      - name: Deploy to Vercel
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && env.deploy_enabled == 'true'
        working-directory: backend
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ env.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ env.VERCEL_PROJECT_ID }}
        run: |
          npm install -g vercel
          vercel pull --yes --environment=production --token="$VERCEL_TOKEN"
          vercel build --prod --token="$VERCEL_TOKEN"
          vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN"
